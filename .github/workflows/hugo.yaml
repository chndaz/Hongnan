name: 部署Hugo到GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true  # 确保云端能看到 blowfish 主题文件
          lfs: true

      - name: 设置Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 构建
        # 强制指定输出到 public 文件夹
        run: hugo --gc --minify --destination public

      - name: 上传部署包
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 最终部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4