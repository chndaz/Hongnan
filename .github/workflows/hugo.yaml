name: 部署Hugo到GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 【新增】必须添加权限，否则 Actions 无法发布网页
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 构建
        run: hugo --gc --minify

      # 【改动重点】不再使用 peaceiris/actions-gh-pages
      # 而是使用官方的两个步骤，这样能彻底干掉 Jekyll 的干扰
      - name: 上传部署包
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: 最终部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4